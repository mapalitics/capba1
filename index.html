<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>caubagis la plata</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Raleway:wght@300;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

    <style>
        :root {
            --font-principal: 'Open Sans', sans-serif;
            --font-titulos: 'Raleway', sans-serif;
            --grafito: #363636;
            --gris-oscuro: #4a4a4a;
            --gris-claro: #dddddd;
            --accent-blue: #0063a2;
            --ancho-barra: 60px;
            --ancho-panel: 320px;
            --alto-header: 60px;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: var(--font-principal); overflow: hidden; background: #eee; }
        
        /* HEADER GRAFITO Y TÍTULO */
        .topbar { 
            height: var(--alto-header); background: var(--grafito); color: white; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 2000; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-bottom: 3px solid var(--accent-blue);
        }
        .logo-header { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 35px; max-width: 150px; object-fit: contain; }
        
        /* TÍTULO REDUCIDO PARA NO COMPETIR CON EL LOGO */
        .gis-title { font-size: 1.7rem; letter-spacing: -0.5px; font-family: var(--font-principal); display: flex; align-items: baseline; }
        .gis-title .bold { font-family: var(--font-titulos); font-weight: 800; letter-spacing: 0px; }
        .gis-title .thin { font-family: var(--font-titulos); font-weight: 300; opacity: 0.8; margin-left: 8px; letter-spacing: 1px; font-size: 1.1rem; }

        /* PESTAÑAS PRINCIPALES (MAPA / TABLERO) */
        .top-tabs { position: absolute; right: 0; height: 100%; display: flex; align-items: center; gap: 5px; }
        .top-tab-btn { background: none; border: none; padding: 0 20px; font-family: var(--font-titulos); font-weight: 700; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; height: 100%; font-size: 0.85rem; letter-spacing: 1px; border-bottom: 4px solid transparent; text-transform: lowercase; }
        .top-tab-btn:hover { color: #ffffff; }
        .top-tab-btn.active { color: #ffffff; border-bottom-color: var(--accent-blue); background: rgba(255,255,255,0.05); }

        /* CONTENEDOR DE VISTAS */
        .main-content-area { width: 100%; height: calc(100vh - var(--alto-header)); position: relative; }
        .main-view { width: 100%; height: 100%; display: none; }
        .main-view.active { display: block; }

        /* ESTRUCTURA DEL MAPA */
        .main-wrapper { display: flex; height: 100%; position: relative; }
        .sidebar { width: var(--ancho-barra); background: var(--grafito); display: flex; flex-direction: column; z-index: 1010; padding-top: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
        .tab-btn { width: var(--ancho-barra); height: var(--ancho-barra); background: transparent; border: none; color: #aaa; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .tab-btn:hover { color: white; background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: white; background: var(--gris-oscuro); border-left: 4px solid var(--accent-blue); }

        /* PANELES CON GLASSMORPHISM */
        .panel-container { 
            position: absolute; top: 0; left: var(--ancho-barra); width: var(--ancho-panel); height: 100%; 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            box-shadow: 3px 0 15px rgba(0,0,0,0.15); 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            transform: translateX(-110%); z-index: 1000; display: flex; flex-direction: column; 
        }
        .panel-container.abierto { transform: translateX(0); }
        .panel-content { display: none; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .panel-content.active { display: block; }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        .panel-header h3 { margin: 0; font-family: var(--font-titulos); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; color: var(--grafito); }

        /* BUSCADOR */
        .header-cols { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 8px; text-align: center; font-size: 0.65rem; color: #777; font-weight: 600; }
        .row-nom { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
        .row-nom label { font-size: 0.65rem; font-weight: 700; color: #444; text-transform: uppercase; }
        input[type="text"] { border: 1px solid var(--gris-claro); border-radius: 4px; padding: 8px; font-size: 0.85rem; text-align: center; font-weight: 600; font-family: inherit; width: 100%; box-sizing: border-box; text-transform: uppercase; transition: 0.2s; background: rgba(255,255,255,0.95); }
        input[type="text"]:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(0,99,162,0.1); }
        
        .btn-accion { width: 100%; padding: 12px; color: white; border: none; cursor: pointer; border-radius: 4px; font-family: var(--font-titulos); font-weight: 800; text-transform: uppercase; margin: 10px 0; transition: 0.2s; }
        .btn-accion:active { transform: scale(0.98); }
        .btn-negro { background: var(--grafito); }
        .btn-gris { background: #666; }
        #estado { font-size: 11px; text-align: center; margin-top: 5px; font-weight: 700; min-height: 15px; text-transform: uppercase; }

        /* CAPAS */
        .layer-item { margin-bottom: 15px; padding: 10px; border: 1px solid rgba(0,0,0,0.05); border-radius: 6px; background: rgba(255,255,255,0.7); }
        .layer-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .layer-name { font-size: 0.85rem; font-weight: 600; color: #333; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }
        .op-control { display: flex; align-items: center; }
        .op-control input[type="range"] { flex: 1; accent-color: var(--accent-blue); height: 4px; cursor: pointer; }

        /* MAPA Y CONTROLES DERECHOS UNIFICADOS */
        #map { flex-grow: 1; height: 100%; z-index: 1; outline: none; }
        .mapa-gris { filter: grayscale(100%); }

        .control-derecho { 
            position: absolute; top: 15px; right: 15px; z-index: 1000; 
            display: flex; flex-direction: column; 
            background: white; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); 
            overflow: hidden; border: 2px solid rgba(0,0,0,0.1); background-clip: padding-box;
        }
        .control-derecho button { 
            background: transparent; border: none; width: 34px; height: 34px; 
            color: var(--grafito); font-size: 16px; font-weight: 700; cursor: pointer; 
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #eee;
        }
        .control-derecho button:last-child { border-bottom: none; }
        .control-derecho button:hover { background: #f4f4f4; color: var(--accent-blue); }

        /* SPINNER ARBA */
        .arba-loader { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); padding: 8px 20px; border-radius: 30px; font-size: 12px; font-weight: 600; color: var(--accent-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 2000; display: none; align-items: center; gap: 10px; border: 1px solid rgba(0,99,162,0.2); }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent-blue); border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ETIQUETAS Y POPUPS */
        .leaflet-tooltip.trans-bg { background-color: transparent !important; border: none !important; box-shadow: none !important; font-family: var(--font-principal) !important; font-weight: 800 !important; color: #222 !important; text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white !important; font-size: 11px !important; padding: 0 !important; pointer-events: none !important; }
        .leaflet-tooltip.trans-bg::before, .leaflet-tooltip.trans-bg::after { display: none !important; }
        .leaflet-tooltip.etiqueta-arba { background-color: transparent !important; border: none !important; box-shadow: none !important; font-size: 11px !important; font-weight: 700 !important; color: #555 !important; text-shadow: 1px 1px 2px white !important; font-family: var(--font-principal) !important; padding: 0 !important; pointer-events: none !important; }
        .leaflet-tooltip.etiqueta-arba::before, .leaflet-tooltip.etiqueta-arba::after { display: none !important; }

        .leaflet-popup-content-wrapper { padding: 0 !important; border-radius: 6px !important; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
        .leaflet-popup-content { margin: 0 !important; width: auto !important; }
        .leaflet-container a.leaflet-popup-close-button { color: #ffffff !important; font-size: 18px !important; top: 7px !important; right: 7px !important; width: 22px !important; height: 22px !important; line-height: 22px !important; text-align: center; font-weight: 400 !important; background: rgba(255,255,255,0.25) !important; border-radius: 50%; transition: 0.2s; z-index: 1000; }
        .leaflet-container a.leaflet-popup-close-button:hover { background: rgba(255,255,255,0.5) !important; }

        .mapa-card { width: 280px; height: 280px; display: flex; flex-direction: column; background: white; font-family: var(--font-principal); }
        .popup-nav { background: #222; color: white; padding: 8px 45px 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-family: var(--font-titulos); font-weight: 700; flex-shrink: 0; }
        .popup-nav button { background: none; border: none; color: white; cursor: pointer; font-weight: 900; font-size: 1rem; transition: 0.2s; padding: 0 10px; }
        .popup-nav button:hover { color: var(--accent-blue); }
        .mapa-card-header { padding: 12px 15px; color: white; font-family: var(--font-titulos); font-weight: 800; font-size: 1rem; flex-shrink: 0; text-transform: uppercase; }
        .mapa-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .mapa-scroll::-webkit-scrollbar { width: 4px; }
        .mapa-scroll::-webkit-scrollbar-track { background: transparent; }
        .mapa-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .mapa-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-transform: lowercase; }
        .mapa-table th, .mapa-table td { padding: 4px 0; border-bottom: 1px solid #f8f9fa; text-align: left; }
        .mapa-table th { color: #888; width: 50%; font-weight: 400; }
        .mapa-table td { font-weight: 600; color: #333; text-align: right; }

        /* GLOBALES FLOTANTES AJUSTADO AL ANCHO DE LA BARRA LATERAL */
        .powered-by { position: absolute; bottom: 20px; left: calc(var(--ancho-barra) + 15px); z-index: 1000; background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; border: 1px solid #ccc; pointer-events: none; font-family: var(--font-principal); }
        
        /* ADAPTACIÓN MÓVIL */
        @media (max-width: 600px) {
            .gis-title { display: none; } /* Ocultamos el título en celular para dejar espacio al logo y pestañas */
        }
    </style>
</head>
<body>

    <div class="topbar">
        <img src="isologotipo.png" class="logo-header" alt="Logo">
        <span class="gis-title">c<span class="bold">au</span>ba<span class="bold">gis</span><span class="thin">la plata</span></span>
        
        <nav class="top-tabs">
            <button class="top-tab-btn active" onclick="switchMainTab('view-map', this)">mapa</button>
            <button class="top-tab-btn" onclick="switchMainTab('view-dashboard', this)">tablero</button>
        </nav>
    </div>

    <div class="main-content-area">
        
        <div id="view-map" class="main-view active">
            <div class="main-wrapper">
                
                <div class="sidebar">
                    <button class="tab-btn" onclick="toggleTab('tab-buscar', this)" title="Buscador Integral"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button class="tab-btn" onclick="toggleTab('tab-capas', this)" title="Capas Activas"><i class="fa-solid fa-layer-group"></i></button>
                </div>

                <div id="panel-principal" class="panel-container">
                    <div id="tab-buscar" class="panel-content">
                        <div class="panel-header"><h3>Buscador Integral</h3><button onclick="cerrarPanel()" style="border:0; background:0; cursor:pointer; font-size:20px; color:#888;">×</button></div>
                        
                        <button class="btn-accion btn-negro" onclick="buscarPorNomenclatura()">BUSCAR NOMENCLATURA</button>
                        <div class="header-cols"><div></div><div>NÚMERO</div><div>LETRA</div></div>
                        <div class="row-nom"><label>PARTIDO</label><input type="text" id="in-pdo" value="055" maxlength="3"><div></div></div>
                        <div class="row-nom"><label>CIRC.</label><input type="text" id="in-circ" placeholder="01" maxlength="2"><div></div></div>
                        <div class="row-nom"><label>SECCIÓN</label><div></div><input type="text" id="in-secc" placeholder="0A" maxlength="2"></div>
                        <div class="row-nom"><label>CHACRA</label><input type="text" id="in-ch-n" maxlength="4"><input type="text" id="in-ch-l" maxlength="3"></div>
                        <div class="row-nom"><label>QUINTA</label><input type="text" id="in-qta-n" maxlength="4"><input type="text" id="in-qta-l" maxlength="3"></div>
                        <div class="row-nom"><label>FRACCIÓN</label><input type="text" id="in-frac-n" maxlength="4"><input type="text" id="in-frac-l" maxlength="3"></div>
                        <div class="row-nom"><label>MANZANA</label><input type="text" id="in-mz-n" maxlength="4"><input type="text" id="in-mz-l" maxlength="3"></div>
                        <div class="row-nom"><label>PARCELA</label><input type="text" id="in-parc-n" maxlength="4"><input type="text" id="in-parc-l" maxlength="3"></div>
                        
                        <hr style="margin:15px 0; border:0; border-top: 1px solid rgba(0,0,0,0.1);">
                        
                        <button class="btn-accion btn-gris" onclick="buscarPorPartida()">BUSCAR PARTIDA</button>
                        <input type="text" id="in-pda" placeholder="EJ: 055024586" onkeypress="if(event.key === 'Enter') buscarPorPartida()">
                        
                        <div id="estado"></div>
                    </div>

                    <div id="tab-capas" class="panel-content">
                        <div class="panel-header"><h3>Capas Activas</h3><button onclick="cerrarPanel()" style="border:0; background:0; cursor:pointer; font-size:20px; color:#888;">×</button></div>
                        <p style="font-size:0.7rem; font-family:var(--font-titulos); font-weight:800; color:#888; margin-bottom:10px;">MAPAS BASE</p>
                        <select id="base-select" onchange="cambiarBase(this.value)" style="width:100%; padding:8px; margin-bottom:20px; font-family:inherit; font-weight:600; border: 1px solid var(--gris-claro); border-radius: 4px; color:#444; background: rgba(255,255,255,0.95);">
                            <option value="osm">OSM (Escala de Grises)</option>
                            <option value="light">Lienzo Claro</option>
                            <option value="sat">Satélite Puro</option>
                            <option value="hybr">Híbrido</option>
                        </select>

                        <p style="font-size:0.7rem; font-family:var(--font-titulos); font-weight:800; color:#888; margin-bottom:10px;">INFORMACIÓN TERRITORIAL</p>
                        <div class="layer-item"><div class="layer-main"><span class="layer-name">Parcelas ARBA</span><label class="switch"><input type="checkbox" id="chk-arba" checked onchange="toggleLayer('arba', this.checked)"><span class="slider"></span></label></div></div>
                        <div class="layer-item"><div class="layer-main"><span class="layer-name">Zonificación</span><label class="switch"><input type="checkbox" id="chk-zoni" checked onchange="toggleLayer('zoni', this.checked)"><span class="slider"></span></label></div><div class="op-control"><input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateOp('zoni', this.value)"></div></div>
                        <div class="layer-item"><div class="layer-main"><span class="layer-name">Riesgo Hídrico</span><label class="switch"><input type="checkbox" id="chk-riesgo" onchange="toggleLayer('riesgo', this.checked)"><span class="slider"></span></label></div><div class="op-control"><input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateOp('riesgo', this.value)"></div></div>
                    </div>
                </div>
                
                <div class="control-derecho">
                    <button onclick="map.zoomIn()" title="Acercar">+</button>
                    <button onclick="map.zoomOut()" title="Alejar">−</button>
                    <button onclick="map.setView([-34.9214, -57.9545], 14)" title="Vista Original (Plaza Moreno)"><i class="fa-solid fa-house"></i></button>
                    <button onclick="centrarGPS()" title="Mi Ubicación (GPS)"><i class="fa-solid fa-location-crosshairs"></i></button>
                </div>

                <div id="arba-loader" class="arba-loader"><div class="spinner"></div>Cargando ARBA...</div>
                <div class="powered-by">powered by <strong>mapalitics</strong></div>
                <div id="map"></div>
            </div>
        </div>

        <div id="view-dashboard" class="main-view">
            <div style="padding: 100px 20px; text-align: center; background: white; height: 100%; box-sizing: border-box;">
                <h2 style="color: var(--grafito); font-family: var(--font-titulos); letter-spacing: 2px; text-transform:uppercase; font-size: 2rem;">módulo tablero</h2>
                <hr style="width: 60px; margin: 25px auto; border: 2px solid var(--accent-blue);">
                <p style="color: #666; font-size: 1.1rem; font-family: var(--font-principal);">estadísticas territoriales y análisis de indicadores.<br><br><span style="font-weight:700; color:var(--accent-blue);">disponible en la próxima etapa.</span></p>
            </div>
        </div>

    </div>

    <script>
        // 0. GESTIÓN DE PESTAÑAS PRINCIPALES
        function switchMainTab(tabId, btn) {
            document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.top-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'view-map' && map) setTimeout(() => map.invalidateSize(), 100);
        }

        // 1. INICIAR MAPA 
        var bases = {
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 22, className: 'mapa-gris'}),
            light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {maxZoom: 22}),
            sat: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {maxZoom: 22}),
            hybr: L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {maxZoom: 22})
        };
        var map = L.map('map', { center: [-34.9214, -57.9545], zoom: 14, layers: [bases.osm], zoomControl: false });

        // JERARQUÍA ESTRICTA DE CAPAS (Panes)
        map.createPane('paneArba'); map.getPane('paneArba').style.zIndex = 390; 
        map.createPane('paneZoni'); map.getPane('paneZoni').style.zIndex = 400; 
        map.createPane('paneRiesgo'); map.getPane('paneRiesgo').style.zIndex = 410; 
        map.createPane('paneResultados'); map.getPane('paneResultados').style.zIndex = 420; 

        function centrarGPS() { map.locate({setView: true, maxZoom: 16}); }

        // 2. CAPAS OPERATIVAS
        var layerResultadoBuscador = L.geoJSON(null, { pane: 'paneResultados', style: { color: '#0063a2', weight: 4, fillOpacity: 0.1 } }).addTo(map);

        function armarEtiquetaArba(f, l) {
            let cca = f.properties.cca; let etiq = "";
            if (cca && cca.length >= 7) { let numStr = cca.slice(-7).substring(0, 4).replace(/^0+/, ''); if (numStr === "") numStr = "0"; etiq = numStr + cca.slice(-7).substring(4, 7).replace(/^0+/, ''); }
            if(etiq && etiq !== "0") l.bindTooltip(etiq, { permanent: true, direction: 'center', className: 'etiqueta-arba' });
        }

        var layerArbaDinamica = L.geoJSON(null, { pane: 'paneArba', style: { color: '#888', weight: 1.2, fillOpacity: 0.5, fillColor: '#cccccc' }, onEachFeature: armarEtiquetaArba }).addTo(map);

        function getColorZonificacion(zona) {
            if (!zona) return 'rgba(52,58,64,1)';
            switch(zona.toUpperCase()) {
                case 'AC-CS2': return 'rgba(187,119,212,1)'; case 'AC-EV': return 'rgba(157,212,99,1)'; case 'AC-IM': return 'rgba(155,89,182,1)'; case 'AC-REX-1': return 'rgba(212,168,224,1)'; case 'AC-REX-2': return 'rgba(232,204,239,1)'; case 'AC-RU': return 'rgba(240,224,192,1)'; case 'AR-AI': return 'rgba(200,160,80,1)'; case 'AR-CC': return 'rgba(212,184,112,1)'; case 'AR-DR': return 'rgba(125,200,122,1)'; case 'AR-IE': return 'rgba(123,94,167,1)'; case 'AR-P': return 'rgba(93,138,60,1)'; case 'AR-RE': return 'rgba(168,204,136,1)'; case 'AR-RI': return 'rgba(122,175,85,1)'; case 'AR-SR': return 'rgba(45,110,45,1)'; case 'AU-CC1': return 'rgba(65,105,225,1)'; case 'AU-CC3 (CENT)': return 'rgba(106,153,238,1)'; case 'AU-CCA': return 'rgba(204,34,0,1)'; case 'AU-CLO1': case 'AU-CLO2': case 'AU-CLO3': case 'AU-CLO4': case 'AU-CLO5': return 'rgba(224,48,48,1)'; case 'AU-CS1': return 'rgba(176,196,222,1)'; case 'AU-DR': return 'rgba(125,200,122,1)'; case 'AU-EF1': return 'rgba(139,0,0,1)'; case 'AU-EF2': return 'rgba(165,32,48,1)'; case 'AU-EV': return 'rgba(157,212,99,1)'; case 'AU-R1': return 'rgba(27,63,139,1)'; case 'AU-R2': return 'rgba(46,94,170,1)'; case 'AU-R3': return 'rgba(68,120,196,1)'; case 'AU-R4': return 'rgba(107,157,212,1)'; case 'AU-R5': return 'rgba(150,189,224,1)'; case 'AU-R6': return 'rgba(192,216,238,1)'; case 'AU-RM': return 'rgba(212,230,245,1)'; case 'AU-UE': return 'rgba(176,176,176,1)'; case 'UE': return 'rgba(176,176,176,1)'; default: return 'rgba(52,58,64,1)'; 
            }
        }

        var capas = {
            arba: layerArbaDinamica,
            zoni: L.geoJSON(null, { pane: 'paneZoni', style: f => { let z = String(f.properties['ZONA_COD']) === 'AU-CC3' ? 'AU-CC3 (CENT)' : String(f.properties['ZONA_COD']); return { color: '#444', weight: 1.5, fillOpacity: 0.5, fillColor: getColorZonificacion(z) }; }, onEachFeature: (f, l) => { if (f.properties && f.properties.ZONA_COD) { l.bindTooltip(f.properties.ZONA_COD, { permanent: true, direction: "center", className: "trans-bg" }).closeTooltip(); } } }).addTo(map),
            riesgo: L.geoJSON(null, { pane: 'paneRiesgo', style: f => { let isA = (String(f.properties['NIVEL_RIES']) === 'Peligrosidad Alta'); return { color: 'rgba(35,35,35,0.5)', weight: 1, fillOpacity: 1, fillColor: isA ? 'rgba(229,115,115,0.5)' : 'rgba(253,216,53,0.5)' }; } })
        };

        fetch('./data/zonificacion.geojson').then(r => r.json()).then(d => capas.zoni.addData(d));
        fetch('./data/riesgo.geojson').then(r => r.json()).then(d => capas.riesgo.addData(d));
        map.on("zoomend", () => { let z = map.getZoom(); capas.zoni.eachLayer(l => { if(l.getTooltip()) z >= 14 ? l.openTooltip() : l.closeTooltip(); }); });

        // 3. WFS ARBA DINÁMICO (ZOOM 19)
        map.on('moveend', () => {
            if (map.getZoom() < 19 || !document.getElementById('chk-arba').checked) return;
            const bbox = map.getBounds().toBBoxString();
            document.getElementById('arba-loader').style.display = 'flex';
            fetch(`https://geo.arba.gov.ar/geoserver/idera/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=idera:Parcela&outputFormat=application/json&srsName=EPSG:4326&bbox=${bbox},EPSG:4326`)
            .then(r => r.json()).then(data => { layerArbaDinamica.clearLayers(); layerArbaDinamica.addData(data); }).finally(() => { document.getElementById('arba-loader').style.display = 'none'; });
        });
        map.on('zoomend', () => { if (map.getZoom() < 19) layerArbaDinamica.clearLayers(); });

        // 4. POPUPS (MAPA-CARD)
        var popupsData = []; var currentPopupIndex = 0; var activePopup = null;
        map.on('click', function(e) {
            var pt = turf.point([e.latlng.lng, e.latlng.lat]);
            popupsData = []; currentPopupIndex = 0;
            if (map.hasLayer(capas.arba)) { capas.arba.eachLayer(function(l) { if (l.feature.geometry && turf.booleanPointInPolygon(pt, l.feature)) popupsData.push({ type: 'arba', p: l.feature.properties }); }); }
            if (map.hasLayer(capas.zoni)) { capas.zoni.eachLayer(function(l) { if (l.feature.geometry && turf.booleanPointInPolygon(pt, l.feature)) popupsData.push({ type: 'zoni', p: l.feature.properties }); }); }
            if (map.hasLayer(capas.riesgo)) { capas.riesgo.eachLayer(function(l) { if (l.feature.geometry && turf.booleanPointInPolygon(pt, l.feature)) popupsData.push({ type: 'riesgo', p: l.feature.properties }); }); }
            if (popupsData.length > 0) renderPopup(e.latlng);
        });

        window.renderPopup = function(latlng) {
            var data = popupsData[currentPopupIndex]; var total = popupsData.length; var content = ""; var headerHTML = "";
            if (total > 1) { headerHTML = `<div class="popup-nav"><button onmousedown="event.stopPropagation();" onclick="event.stopPropagation(); cambiarPopup(-1)">❮</button><span>capa ${currentPopupIndex + 1} de ${total}</span><button onmousedown="event.stopPropagation();" onclick="event.stopPropagation(); cambiarPopup(1)">❯</button></div>`; }

            if (data.type === 'zoni') {
                let p = data.p; for (let k in p) if (p[k] === "NULL" || p[k] === null) p[k] = "-";
                let z = p.ZONA_COD === 'AU-CC3' ? 'AU-CC3 (CENT)' : p.ZONA_COD; let bg = getColorZonificacion(z); let desc = (p.ZONA_DESC || '').toLowerCase();
                content = `<div class="mapa-card">${headerHTML}<div class="mapa-card-header" style="background:${bg}">zona: ${z.toLowerCase()}</div><div class="mapa-scroll"><small style="color:#666; font-weight:600; display:block; margin-bottom:10px; font-size:0.75rem; border-bottom:1px solid #eee; padding-bottom:5px;">${desc}</small><table class="mapa-table"><tr><th>área tipo</th><td>${(p.AREA_TIPO || '-').toLowerCase()}</td></tr><tr><th>fos máx</th><td>${p.FOS_MAX}</td></tr><tr><th>fot (res/com)</th><td>${p.FOT_RES} / ${p.FOT_COM}</td></tr><tr><th>fot mínimo</th><td>${p.FOT_MIN || '-'}</td></tr><tr><th>densidad (res/com)</th><td>${p.DENS_RES} / ${p.DENS_COM}</td></tr><tr><th>altura máx / niv.</th><td>${p.ALTURA_M}m (${p.NIVELES})</td></tr><tr><th>retiros (fr/fo/la)</th><td>${p.RET_FRENTE || '-'}/${p.RET_FONDO || '-'}/${p.RET_LATERA || '-'}</td></tr><tr><th>sup. parcela mín.</th><td>${p.PARC_SUP_M || '-'} m²</td></tr><tr><th>cuf (av/calle)</th><td>${p.CUF_AV || '-'}/${p.CUF_CAL || '-'}</td></tr></table></div></div>`;
            } else if (data.type === 'riesgo') {
                let p = data.p; for (let k in p) if (p[k] === "NULL" || p[k] === null) p[k] = "-";
                let col = (p.NIVEL_RIES === 'Peligrosidad Alta') ? '#dc3545' : '#c69500';
                content = `<div class="mapa-card">${headerHTML}<div class="mapa-card-header" style="background:${col};">${(p.NIVEL_RIES || '').toLowerCase()}</div><div class="mapa-scroll"><small style="color:#666; display:block; margin-bottom:10px; font-weight:600; font-size:0.75rem; border-bottom:1px solid #eee; padding-bottom:5px;">${(p.ZONA_DESC || '').toLowerCase()}</small><table class="mapa-table"><tr><th>tipo restricción</th><td>${(p.TIPO_RESTR || '-').toLowerCase()}</td></tr><tr><th>condición</th><td>${(p.CONDICION_ || '-').toLowerCase()}</td></tr><tr><th>eval. exigida</th><td>${p.EVAL_EXIGI || '-'}</td></tr><tr><th>afecta fos</th><td style="color:${col};">${(p.AFECTA_FOS || '-').toLowerCase()}</td></tr></table></div></div>`;
            } else if (data.type === 'arba') {
                let p = data.p; let cca = p.cca; let etiq = "";
                if (cca && cca.length >= 7) { let numStr = cca.slice(-7).substring(0, 4).replace(/^0+/, ''); if (numStr === "") numStr = "0"; etiq = numStr + cca.slice(-7).substring(4, 7).replace(/^0+/, ''); }
                content = `<div class="mapa-card">${headerHTML}<div class="mapa-card-header" style="background:#363636;">parcela: ${etiq || '-'}</div><div class="mapa-scroll" style="padding-top:15px;"><table class="mapa-table"><tr><th>partida</th><td>${p.pda || '-'}</td></tr><tr><th>área</th><td>${p.ara1 || '-'} m²</td></tr></table></div></div>`;
            }
            if (!latlng) { activePopup.setContent(content); } else { activePopup = L.popup({ autoPanPadding: [10, 10] }).setLatLng(latlng).setContent(content).openOn(map); }
        }

        window.cambiarPopup = function(dir) { currentPopupIndex += dir; if (currentPopupIndex < 0) currentPopupIndex = popupsData.length - 1; if (currentPopupIndex >= popupsData.length) currentPopupIndex = 0; renderPopup(); }

        // 5. LÓGICA DE INTERFAZ
        function cambiarBase(key) { Object.values(bases).forEach(b => map.removeLayer(b)); bases[key].addTo(map); }
        function toggleLayer(key, visible) { visible ? capas[key].addTo(map) : map.removeLayer(capas[key]); }
        function updateOp(key, val) { if(capas[key].setStyle) capas[key].setStyle({ fillOpacity: val }); }

        function toggleTab(id, btn) {
            const panel = document.getElementById('panel-principal');
            if (panel.classList.contains('abierto') && btn.classList.contains('active')) { cerrarPanel(); return; }
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active'); document.getElementById(id).classList.add('active'); panel.classList.add('abierto');
        }

        function cerrarPanel() { document.getElementById('panel-principal').classList.remove('abierto'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); }

        // 6. BUSCADORES
        function msg(texto, color = "#666") { document.getElementById('estado').innerText = texto; document.getElementById('estado').style.color = color; }

        function armarCCA() {
            const fmt = (id, len) => document.getElementById(id).value.toUpperCase().trim().padStart(len, '0');
            return (fmt('in-pdo', 3) + fmt('in-circ', 2) + fmt('in-secc', 2) + fmt('in-ch-n', 4) + fmt('in-ch-l', 3) + fmt('in-qta-n', 4) + fmt('in-qta-l', 3) + fmt('in-frac-n', 4) + fmt('in-frac-l', 3) + fmt('in-mz-n', 4) + fmt('in-mz-l', 3) + fmt('in-parc-n', 4) + fmt('in-parc-l', 3)).substring(0, 42);
        }
        function desarmarCCA(cca) {
            if (!cca || cca.length < 42) return;
            const tN = (str) => str.replace(/^0+/, '') || ''; const tL = (str) => str.replace(/^0+/, '') || ''; 
            document.getElementById('in-pdo').value = cca.slice(0, 3); document.getElementById('in-circ').value = tN(cca.slice(3, 5)); document.getElementById('in-secc').value = tL(cca.slice(5, 7));
            document.getElementById('in-ch-n').value = tN(cca.slice(7, 11)); document.getElementById('in-ch-l').value = tL(cca.slice(11, 14)); document.getElementById('in-qta-n').value = tN(cca.slice(14, 18));
            document.getElementById('in-qta-l').value = tL(cca.slice(18, 21)); document.getElementById('in-frac-n').value = tN(cca.slice(21, 25)); document.getElementById('in-frac-l').value = tL(cca.slice(25, 28));
            document.getElementById('in-mz-n').value = tN(cca.slice(28, 32)); document.getElementById('in-mz-l').value = tL(cca.slice(32, 35)); document.getElementById('in-parc-n').value = tN(cca.slice(35, 39)); document.getElementById('in-parc-l').value = tL(cca.slice(39, 42));
        }

        window.buscarPorPartida = function() {
            let pdaInput = document.getElementById('in-pda').value.trim(); if (!pdaInput) return;
            msg("CONSULTANDO ARBA..."); layerResultadoBuscador.clearLayers();
            fetch(`https://geo.arba.gov.ar/geoserver/idera/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=idera:Parcela&outputFormat=application/json&srsName=EPSG:4326&cql_filter=pda='${pdaInput}'`).then(r => r.json()).then(data => {
                if (data.features && data.features.length > 0) { msg("✅ UBICADA", "#0063a2"); layerResultadoBuscador.addData(data); map.fitBounds(layerResultadoBuscador.getBounds(), { maxZoom: 19 }); if (data.features[0].properties.cca) desarmarCCA(data.features[0].properties.cca); } else { msg("❌ NO ENCONTRADA", "red"); }
            }).catch(() => msg("⚠️ ERROR", "red"));
        }

        window.buscarPorNomenclatura = function() {
            msg("CONSULTANDO ARBA..."); layerResultadoBuscador.clearLayers();
            fetch(`https://geo.arba.gov.ar/geoserver/idera/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=idera:Parcela&outputFormat=application/json&srsName=EPSG:4326&cql_filter=cca LIKE '${armarCCA()}%25'`).then(r => r.json()).then(data => {
                if (data.features && data.features.length > 0) { msg("✅ UBICADA", "#0063a2"); layerResultadoBuscador.addData(data); map.fitBounds(layerResultadoBuscador.getBounds(), { maxZoom: 19 }); if (data.features[0].properties.pda) document.getElementById('in-pda').value = data.features[0].properties.pda; } else { msg("❌ NO ENCONTRADA", "red"); }
            }).catch(() => msg("⚠️ ERROR", "red"));
        }
    </script>
</body>
</html>
